benchmark:
  runner:
    mode: local
  contestant_name: slaymetrics 
  script_path: scripts/benchmark/benchmark.sh
  compare_script_path: scripts/benchmark/compare-results.sh
  results_directory: scripts/benchmark/results
  cooling_period_seconds: 30
  final_benchmark_duration_minutes: 5
  collect_live_audit: true     # collect dynamic runtime metrics during benchmark
  live_sampling:
    enabled: true
    interval_seconds: 2        # sample every N seconds
    max_samples: 25            # downsample to this before analysis (handles long benchmarks)
  workloads:
    - homepage
    - small
    - medium
    - large
    - mixed
