llm:
  active_profile: granite-local         # change this one line to switch LLM

  profiles:
    granite-local:                     # local Granite 4 via Ollama
      backend: ollama
      model: granite4:7b-a1b-h
      base_url: http://localhost:11434

    gpt-oss-local:                     # local GPT-OSS via Ollama
      backend: ollama
      model: gpt-oss-120b
      base_url: http://localhost:11434

    claude-remote:                     # remote Anthropic fallback
      backend: claude
      model: claude-opus-4-6
      api_key_env: ANTHROPIC_API_KEY      # pragma: allowlist secret

memory:
  backend: tidb
  host: localhost
  port: 4000
  database: perfagent
  user: root
  password_env: TIDB_PASSWORD          # pragma: allowlist secret

target:
  host_env: DUT_HOST                # reads IP from .env DUT_HOST variable
  host: 127.0.0.1                   # fallback if DUT_HOST not set
  ssh_user: root
  ssh_key: ~/.ssh/id_rsa
  ssh_timeout: 30

bench:
  host: localhost                   # agent runs here, wrk runs here
  ssh_user: root
  ssh_key: ~/.ssh/id_rsa
  ssh_timeout: 30

service:
  name: nginx
  type: webserver
  config_path: /etc/nginx/nginx.conf
  systemd_unit: nginx.service
  log_path: /var/log/nginx/access.log
  benchmark:
    # Use hackathon's official benchmark.sh instead of wrk2
    tool: hackathon
    script: /root/hackathon-tools/benchmark.sh
    contestant_name_env: CONTESTANT_NAME
    contestant_name: slaymetrics
    target_host_env: DUT_HOST
    # Fallback wrk2 config (used if benchmark.sh not available)
    duration: 30
    threads: 16
    connections: 1000
    rate: 1000000
    small_file_url: "http://${DUT_HOST:-localhost}/1kb.html"
    medium_file_url: "http://${DUT_HOST:-localhost}/100kb.html"
    large_file_url: "http://${DUT_HOST:-localhost}/1mb.html"

rhel:
  checks:
    - cpu_governor
    - transparent_hugepages
    - selinux_mode
    - sysctl_net_params
    - irq_affinity
    - filesystem_mount_options
    - numa_topology
    - open_file_limits
    - nic_offloading
    - kernel_version

agent:
  improvement_threshold_pct: 5
  max_iterations: 50
  benchmark_after_every_fix: true
  stability:
    enabled: false
    duration_sec: 1800
    sample_interval_sec: 60
    url_key: small_file_url
