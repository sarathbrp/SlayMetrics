log_level: INFO   # INFO, DEBUG, WARNING — controls all hosttune log output

mlflow:
  enabled: false 
  tracking_uri: http://d21-h24-000-r650.rdu2.scalelab.redhat.com:5000/  # override: SLAY_MLFLOW_URI
  experiment: SlayMetrics  # override: SLAY_MLFLOW_EXPERIMENT

memory:
  inject_into_rca_analysis: true      # pass similar_cases to Call 1 (RCA report)
  inject_into_fix_extraction: true    # pass similar_cases to Call 2 (fix parser)

optimization:
  min_new_examples: 5       # trigger BootstrapFewShot after this many new examples
  max_bootstrap_demos: 3    # max few-shot demonstrations injected into prompt

remediation:
  improvement_threshold_pct: -0.2  # reject only if priority workloads degrade by more than 0.2%
  degradation_tolerance_pct: -5.0  # max allowed degradation in non-priority workloads
  llm_review_rejected: true        # when a rejected fix has positive overall improvement, ask LLM to review
  network_tools:
    # Per-tool scope: none | read | write
    #   none  — tool hidden from LLM, never applied
    #   read  — shown in fix plan (read_current works), but apply is blocked
    #   write — full apply + rollback allowed
    tc_shaping: write
    iptables_connlimit: write
    nftables_ratelimit: write
  max_fixes: 23                     # safety cap on fixes per run

target:
  mode: ssh
  host: 172.21.90.178                    # override: SLAY_DUT_HOST
  user: root                             # override: SLAY_DUT_USER
  private_key_path: /path/to/dut_key              # override: SLAY_DUT_KEY
  port: 22                               # override: SLAY_DUT_PORT
  connect_timeout_seconds: 30            # override: SLAY_DUT_TIMEOUT

orchestration:
  max_parallel_audits: 10                # fleet mode: audit fan-out parallelism
  # Optional shared password for installer -> target SSH in orchestrate mode.
  # Prefer env var SLAY_TARGET_PASSWORD or CLI --target-password to avoid storing secrets.
  target_password: ""
  installer:
    user: root                            # Mac -> installer SSH user (orchestrate mode)
    private_key_path: /path/to/installer_key        # Mac -> installer SSH key path
    port: 22
    connect_timeout_seconds: 30
    remote_tmp: /tmp/slaymetrics_orchestrate
    auto_install_wrk: true                # auto-install wrk on installer if missing

