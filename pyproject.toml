[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [
  ".venv312",
  "report",
]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
]

[tool.ruff.lint.per-file-ignores]
"tests/*.py" = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
pythonpath = ["."]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.12"
pretty = true
show_error_codes = true
ignore_missing_imports = true
warn_unused_ignores = true
disable_error_code = ["import-untyped"]
exclude = "(^\\.venv312/|^report/)"
